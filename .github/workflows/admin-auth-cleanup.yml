name: Admin Auth validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  validate:
    if: github.head_ref == 'auth/secure-admin-rollout'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auth/secure-admin-rollout
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Reconcile catalog fixtures
        run: npm run catalog:reconcile
      - name: Verify legacy Auth removal
        run: npm run auth:scan
      - name: Run UI and Auth tests
        run: npm run test:ui
      - name: Run catalog reconciliation tests
        run: npx vitest run catalog/bmaxCatalogReconciliation.test.ts --config vitest.catalog.config.ts
      - name: Run description and inquiry tests
        run: npx vitest run catalog/catalogDescriptionSecurity.test.ts --config vitest.catalog.config.ts
      - name: Type-check
        run: npx tsc --noEmit
      - name: Compile Next.js application
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-public-anon-key
