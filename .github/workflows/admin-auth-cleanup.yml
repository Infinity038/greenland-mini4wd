name: Admin Auth cleanup

on:
  push:
    branches:
      - auth/secure-admin-rollout

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auth/secure-admin-rollout
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Update dependency lock
        run: npm install --package-lock-only --ignore-scripts
      - name: Remove legacy page gates
        run: node scripts/admin-page-cleanup.mjs
      - name: Remove temporary compatibility bridge
        run: rm app/admin/layout.tsx
      - name: Install and validate
        run: |
          npm ci
          npm run auth:scan
          npm run build
      - name: Commit clean Auth state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/admin-auth-cleanup.yml scripts/admin-page-cleanup.mjs
          git add app/admin package-lock.json
          git commit -m "Remove legacy admin password and local session gates"
          git push origin HEAD:auth/secure-admin-rollout
