name: Admin Auth validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  validate:
    if: github.head_ref == 'auth/secure-admin-rollout'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auth/secure-admin-rollout
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify legacy Auth removal
        run: npm run auth:scan
      - name: Run full test and production build
        run: npm run build
